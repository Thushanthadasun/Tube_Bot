openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: openai
    description: OpenAI AI chat operations
  - name: youtube
    description: YouTube search and preferences
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
  /youtube/search:
    get:
      operationId: searchYoutube
      tags: [youtube]
      summary: Search YouTube videos with AI filtering
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: conversationId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: YouTube search results (filtered)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/YoutubeVideo"
  /youtube/homepage:
    get:
      operationId: getYoutubeHomepage
      tags: [youtube]
      summary: Get filtered YouTube homepage recommendations
      parameters:
        - name: conversationId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Filtered homepage videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/YoutubeVideo"
  /youtube/preferences:
    get:
      operationId: getYoutubePreferences
      tags: [youtube]
      summary: Get user's content filter preferences
      responses:
        "200":
          description: Current preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YoutubePreferences"
    post:
      operationId: updateYoutubePreferences
      tags: [youtube]
      summary: Update content filter preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateYoutubePreferencesBody"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YoutubePreferences"
  /youtube/chat:
    post:
      operationId: youtubeChatMessage
      tags: [youtube]
      summary: Send a chat message to the YouTube AI assistant (streaming)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/YoutubeChatMessageBody"
      responses:
        "200":
          description: SSE stream with AI response and optional video results
          content:
            text/event-stream: {}
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    YoutubeVideo:
      type: object
      properties:
        videoId:
          type: string
        title:
          type: string
        description:
          type: string
        thumbnailUrl:
          type: string
        channelTitle:
          type: string
        publishedAt:
          type: string
        viewCount:
          type: string
        duration:
          type: string
        categoryId:
          type: string
      required:
        - videoId
        - title
        - thumbnailUrl
        - channelTitle
        - publishedAt
    YoutubePreferences:
      type: object
      properties:
        id:
          type: integer
        blockedCategories:
          type: array
          items:
            type: string
        blockedKeywords:
          type: array
          items:
            type: string
        blockedChannels:
          type: array
          items:
            type: string
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - blockedCategories
        - blockedKeywords
        - blockedChannels
        - updatedAt
    UpdateYoutubePreferencesBody:
      type: object
      properties:
        blockedCategories:
          type: array
          items:
            type: string
        blockedKeywords:
          type: array
          items:
            type: string
        blockedChannels:
          type: array
          items:
            type: string
    YoutubeChatMessageBody:
      type: object
      properties:
        message:
          type: string
        conversationId:
          type: integer
      required:
        - message
