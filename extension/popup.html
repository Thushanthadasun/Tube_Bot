<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #0f0f0f;
      color: #f1f1f1;
      font-family: 'Roboto', Arial, sans-serif;
      font-size: 14px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #272727;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff0000;
      flex-shrink: 0;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
    }
    .section {
      padding: 14px 16px;
      border-bottom: 1px solid #1a1a1a;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .empty-state {
      color: #666;
      font-size: 13px;
      font-style: italic;
    }
    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      color: #ccc;
    }
    .chip-remove {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      line-height: 1;
      transition: color 0.1s;
    }
    .chip-remove:hover { color: #ff4444; }
    .instructions {
      padding: 14px 16px;
      color: #888;
      font-size: 12.5px;
      line-height: 1.6;
    }
    .instructions strong { color: #ccc; }
    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 12px;
      color: #666;
    }
    .open-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #ff0000;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      margin: 12px 0 4px;
      transition: background 0.12s;
    }
    .open-btn:hover { background: #cc0000; }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot"></div>
    <h1>TubeChat AI</h1>
  </div>

  <div class="section">
    <div class="section-title">Blocked Content</div>
    <div id="blocked-list" class="chip-list">
      <span class="empty-state">Nothing blocked yet</span>
    </div>
  </div>

  <div class="instructions">
    Open YouTube and click the <strong>red chat button</strong> at the bottom right to start chatting with your AI assistant.<br><br>
    <strong>Examples:</strong><br>
    "Don't show me music videos"<br>
    "Show me Python tutorials"<br>
    "Block FOX News channel"
  </div>

  <div class="footer">
    <button class="open-btn" id="open-yt">Open YouTube</button>
    TubeChat AI — works on youtube.com
  </div>

  <script src="popup.js"></script>
</body>
</html>
